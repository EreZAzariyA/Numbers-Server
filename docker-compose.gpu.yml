# GPU override — merges with docker-compose.yml to add NVIDIA device reservation to Ollama.
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml --profile ollama up -d

services:
  ollama:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
